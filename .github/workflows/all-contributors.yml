name: All Contributors

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  add-contributor:
    if: startsWith(github.event.comment.body, '@all-contributors')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: All Contributors Action
        uses: all-contributors/all-contributors-action@v0.4.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
